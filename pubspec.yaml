name: hr_desktop
description: "HR Management System - Desktop Application for HR Managers, Accountants & Admins"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # UI Components
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  lucide_icons: ^0.257.0
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Navigation
  go_router: ^14.2.0
  
  # Data & Storage
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Charts & Visualization
  fl_chart: ^0.68.0
  
  # Tables
  data_table_2: ^2.5.12
  
  # Forms & Validation
  reactive_forms: ^17.0.1
  
  # File & Document Handling
  file_picker: ^8.0.3
  pdf: ^3.10.8
  printing: ^5.12.0
  
  # Backend
  appwrite: 21.1.0
  
  # Utils
  uuid: ^4.4.0
  collection: ^1.18.0
  equatable: ^2.0.5
  intl: any
  
  # Fonts
  google_fonts: ^6.2.1
  
  # Animations
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  
  # Window Management (Desktop)
  window_manager: ^0.3.9
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
